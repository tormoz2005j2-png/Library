<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Моя библиотека</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/main.css"></head>
<body><header class="site"><div class="wrap"><div class="head-top"><div><h1>Моя <span class="accent">библиотека</span></h1><p class="tagline">Читайте, собирайте историю, делитесь впечатлениями.</p></div><nav class="account" id="account"><button class="btn btn-ghost" data-action="auth">Войти</button></nav></div></div><div class="stats" id="stats"></div></header>
<div class="wrap"><div class="controls"><div class="search"><span>⌕</span><input id="search" placeholder="Название, автор или серия…" aria-label="Поиск"></div><select class="filter" id="fType"><option value="">Все типы</option><option>Книга</option><option>Комикс</option><option>Манга</option></select><select class="filter" id="fStatus"><option value="">Все личные статусы</option><option value="want_to_read">Хочу прочитать</option><option value="reading">Читаю</option><option value="read">Прочитано</option><option value="purchased">Куплено</option><option value="sold">Продано</option><option value="on_hold">Отложено</option></select><select class="filter" id="sort"><option value="added">Сначала новые</option><option value="title">По названию</option><option value="author">По автору</option></select><div class="btn-row"><button class="btn btn-primary admin-only" id="addItemBtn">+ Тайтл</button></div></div><main><div class="grid" id="grid" aria-live="polite"></div></main></div>
<footer><div class="wrap">Публичный каталог открыт всем. Личные статусы, сделки и кабинет видите только вы.</div></footer>

<div class="overlay" id="authOverlay"><div class="modal auth-modal"><div class="modal-head"><h2 id="authTitle">Вход</h2><button class="x" data-close="authOverlay">×</button></div><form id="authForm" class="modal-body"><div class="field register-only"><label>Имя</label><input id="authName" autocomplete="name" maxlength="80"></div><div class="field"><label>Email</label><input id="authEmail" type="email" autocomplete="email" required></div><div class="field"><label>Пароль</label><input id="authPassword" type="password" minlength="8" autocomplete="current-password" required></div><p class="form-error" id="authError"></p><button class="btn btn-primary wide" id="authSubmit">Войти</button><button type="button" class="text-btn" id="authSwitch">Нет аккаунта? Зарегистрироваться</button></form></div></div>

<div class="overlay" id="viewOverlay"><div class="modal detail-modal"><div class="modal-head"><h2 id="viewTitle">Тайтл</h2><button class="x" data-close="viewOverlay">×</button></div><div class="modal-body" id="viewBody"></div></div></div>
<div class="overlay" id="profileOverlay"><div class="modal detail-modal"><div class="modal-head"><h2>Личный кабинет</h2><button class="x" data-close="profileOverlay">×</button></div><div class="modal-body" id="profileBody"></div></div></div>
<div class="overlay" id="adminOverlay"><div class="modal detail-modal"><div class="modal-head"><h2>Управление библиотекой</h2><button class="x" data-close="adminOverlay">×</button></div><div class="modal-body" id="adminBody"></div></div></div>

<div class="overlay" id="formOverlay"><div class="modal"><div class="modal-head"><h2 id="catalogFormTitle">Тайтл каталога</h2><button class="x" data-close="formOverlay">×</button></div><form id="titleForm" class="modal-body"><input type="hidden" id="editId"><div class="row2"><div class="field"><label>Название *</label><input id="f-title" required maxlength="500"></div><div class="field"><label>Автор</label><input id="f-author" maxlength="500"></div></div><div class="row3"><div class="field"><label>Тип</label><select id="f-type"><option>Книга</option><option>Комикс</option><option>Манга</option></select></div><div class="field"><label>Год издания</label><input id="f-pubDate"></div><div class="field"><label>ISBN</label><input id="f-isbn"></div></div><div class="row2"><div class="field"><label>Обложка URL</label><input id="f-cover" type="url"></div><div class="field"><label>HD-обложка URL</label><input id="f-hdCover" type="url"></div></div><div class="row3"><div class="field"><label>Издатель</label><input id="f-publisher"></div><div class="field"><label>Серия</label><input id="f-series"></div><div class="field"><label>Язык</label><input id="f-language"></div></div><div class="field"><label>Жанры через запятую</label><input id="f-genres"></div><div class="field"><label>Аннотация</label><textarea id="f-annotation" maxlength="30000"></textarea></div><p class="form-error" id="titleError"></p><button class="btn btn-primary">Сохранить</button></form></div></div>
<div class="toast" id="toast" role="status"></div><script src="assets/js/config.js"></script><script src="assets/js/library-api-client.js"></script><script src="assets/js/app.js"></script></body></html>
